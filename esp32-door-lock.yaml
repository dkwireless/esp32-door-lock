# ESPHome — Airbnk BLE-MQTT Bridge
# ESP32-C3, ESP-IDF NimBLE, esphome 2026.6+
# Pure MQTT bridge: lock scan, advertisement to MQTT,
# command push.

substitutions:
  # --- Device info ---
  name: "esp32-door-lock"
  friendly_name: "ESP32 Door Lock Bridge"
  device_id: "aaa5a38"

  # --- Airbnk lock MAC (put your MAC!) ---
  lock_mac: "E4:E1:12:C6:53:55"

  # --- MQTT topic prefix ---
  mqtt_topic_prefix: "airbnk/${device_id}"

  # --- MQTT broker ---
  mqtt_broker: "192.168.6.11"
  mqtt_port: "1883"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    build_flags: >
      -I/home/dragan/.platformio/packages/framework-espidf/components/bt/include/esp32c3/include
      -I/home/dragan/.platformio/packages/framework-espidf/components/bt/host/nimble/nimble/porting/nimble/include
      -I/home/dragan/.platformio/packages/framework-espidf/components/bt/host/nimble/nimble/nimble/host/include
      -I/home/dragan/.platformio/packages/framework-espidf/components/bt/host/nimble/esp-hci/include
      -I/home/dragan/.platformio/packages/framework-espidf/components/bt/host/nimble/nimble/nimble/host/services/gap/include
      -I/home/dragan/.platformio/packages/framework-espidf/components/bt/host/nimble/nimble/nimble/host/util/include

esp32:
# --- change to your esp32 device model
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
    version: "5.5.4"
    sdkconfig_options:
      CONFIG_BT_ENABLED: "y"
      CONFIG_BTDM_CTRL_MODE_BLE_ONLY: "y"
      CONFIG_BT_BLUEDROID_ENABLED: "n"
      CONFIG_BT_NIMBLE_ENABLED: "y"

external_components:
  - source:
      type: local
      path: components

airbnk_gateway:
  id: airbnk_component
  mac_address: "${lock_mac}"
  topic_prefix: "${mqtt_topic_prefix}"

logger:
  level: INFO

mqtt:
  broker: ${mqtt_broker}
  port: ${mqtt_port}
  username: !secret mqttuser
  password: !secret mqttpassword
  discovery: false
  birth_message:
    topic: ${mqtt_topic_prefix}/availability
    payload: "online"
  will_message:
    topic: ${mqtt_topic_prefix}/availability
    payload: "offline"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret wifi_password

api:
  encryption:
    key: "N+eLUSJpfJMtxYDjs9KXt7A8de2O0Y8L2ug2S8g7jls="

ota:
  - platform: esphome
    password: !secret ota_password

#web_server:
#  port: 80

captive_portal:
