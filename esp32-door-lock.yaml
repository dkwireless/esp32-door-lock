# ESPHome — Airbnk BLE-MQTT Bridge
# ESP32-C3, ESP-IDF NimBLE, esphome 2026.4+
#
# Pure MQTT bridge: all state → airbnk/{device_id}/state (JSON)
# Commands → airbnk/{device_id}/command: {"action":"unlock"|"lock"}

substitutions:
  name: "esp32-door-lock"
  friendly_name: "ESP32 Door Lock Bridge"
  device_id: "aaa5a38"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio
    board_build.f_cpu: "160000000L"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
    version: "5.5.4"
    sdkconfig_options:
      CONFIG_BT_ENABLED: "y"
      CONFIG_BTDM_CTRL_MODE_BLE_ONLY: "y"
      CONFIG_BT_BLUEDROID_ENABLED: "n"
      CONFIG_BT_NIMBLE_ENABLED: "y"
      CONFIG_BT_NIMBLE_MAX_CONNECTIONS: "1"
      CONFIG_BT_NIMBLE_MAX_BONDS: "0"
      CONFIG_BT_NIMBLE_MAX_CCCDS: "2"
      CONFIG_BT_NIMBLE_L2CAP_COC_MAX_NUM: "0"
      CONFIG_BT_NIMBLE_MESH: "n"
      CONFIG_BT_NIMBLE_CRYPTO_STACK_MBEDTLS: "y"
      CONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE: "4096"
      CONFIG_MBEDTLS_HARDWARE_AES: "y"
      CONFIG_MBEDTLS_HARDWARE_SHA: "y"
      CONFIG_MBEDTLS_AES_C: "y"
      CONFIG_MBEDTLS_ECB_C: "y"
      CONFIG_MBEDTLS_SHA1_C: "y"
      CONFIG_MBEDTLS_MD_C: "y"
      CONFIG_MBEDTLS_MD5_C: "n"
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "4096"
      CONFIG_FREERTOS_IDLE_TASK_STACK_SIZE: "1536"
      CONFIG_ESP_SYSTEM_EVENT_TASK_STACK_SIZE: "2304"
      CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM: "8"
      CONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM: "16"
      CONFIG_LOG_DEFAULT_LEVEL_INFO: "y"
      CONFIG_BOOTLOADER_LOG_LEVEL_NONE: "y"

external_components:
  - source:
      type: local
      path: components

airbnk_gateway:
  id: airbnk_component
  mac_address: "${lock_mac}"
  topic_prefix: "${mqtt_topic_prefix}"

logger:
  level: INFO

mqtt:
  broker: 192.168.6.11
  port: 1883
  username: !secret mqttuser
  password: !secret mqttpassword
  discovery: false
  birth_message:
    topic: airbnk/${device_id}/availability
    payload: "online"
  will_message:
    topic: airbnk/${device_id}/availability
    payload: "offline"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_password

api:
  encryption:
    key: "N+eLUSJpfJMtxYDjs9KXt7A8de2O0Y8L2ug2S8g7jls="

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

captive_portal:
