# ESPHome — Airbnk BLE-MQTT Bridge
# ESP32-C3, ESP-IDF NimBLE, esphome 2026.6+
# Pure MQTT bridge: skenira lock, objavljuje advertisement na MQTT,
# kad stigne komanda, spaja se na lock preko BLE GATT i cita status.

substitutions:
  # --- Device info ---
  name: "esp32-door-lock"
  friendly_name: "ESP32 Door Lock Bridge"
  device_id: "aaa5a38"

  # --- Airbnk lock MAC (obavezno promeniti!) ---
  lock_mac: "E4:E1:12:C7:5C:52"

  # --- MQTT topic prefix ---
  mqtt_topic_prefix: "airbnk/${device_id}"

  # --- MQTT broker ---
  mqtt_broker: "192.168.6.11"
  mqtt_port: "1883"

framework_pkg: "/home/dragan/.platformio/packages/framework-espidf"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  build_flags:
    - "-I${framework_pkg}/components/bt/include/esp32c3/include"
    - "-I${framework_pkg}/components/bt/host/nimble/nimble/porting/nimble/include"
    - "-I${framework_pkg}/components/bt/host/nimble/nimble/nimble/host/include"
    - "-I${framework_pkg}/components/bt/host/nimble/esp-hci/include"
    - "-I${framework_pkg}/components/bt/host/nimble/nimble/nimble/host/services/gap/include"
    - "-I${framework_pkg}/components/bt/host/nimble/nimble/nimble/host/util/include"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
    version: "5.5.4"
    sdkconfig_options:
      CONFIG_BT_ENABLED: "y"
      CONFIG_BTDM_CTRL_MODE_BLE_ONLY: "y"
      CONFIG_BT_BLUEDROID_ENABLED: "n"
      CONFIG_BT_NIMBLE_ENABLED: "y"

external_components:
  - source:
      type: local
      path: components

airbnk_gateway:
  id: airbnk_component
  mac_address: "${lock_mac}"
  topic_prefix: "${mqtt_topic_prefix}"

logger:
  level: INFO

mqtt:
  broker: ${mqtt_broker}
  port: ${mqtt_port}
  username: !secret mqttuser
  password: !secret mqttpassword
  discovery: false
  birth_message:
    topic: ${mqtt_topic_prefix}/availability
    payload: "online"
  will_message:
    topic: ${mqtt_topic_prefix}/availability
    payload: "offline"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret wifi_password

api:
  encryption:
    key: "N+eLUSJpfJMtxYDjs9KXt7A8de2O0Y8L2ug2S8g7jls="

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

captive_portal:
